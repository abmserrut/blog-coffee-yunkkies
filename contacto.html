<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog de Café</title>
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("coffee-yunkkies-theme");
          if (storedTheme === "dark" || storedTheme === "light") {
            document.documentElement.setAttribute("data-theme", storedTheme);
          }
        } catch (error) {}
      })();
    </script>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/app.js" defer></script>
  </head>

  <body>
    <header class="header">
      <div class="contenedor">
        <div class="barra">
          <a class="logo" href="index.html">
            <h1 class="logo__nombre no-margin centrar-texto">
              Coffe<span class="logo__bold">Yunkkies</span>
            </h1>
          </a>

          <div class="barra__acciones">
            <nav class="navegacion">
              <a href="nosotros.html" class="navegacion__enlace">Nosotros</a
              ><a href="cursos.html" class="navegacion__enlace">Cursos</a
              ><a href="contacto.html" class="navegacion__enlace">Contacto</a>
            </nav>
            <button
              class="theme-toggle"
              type="button"
              aria-label="Cambiar tema"
              title="Cambiar tema"
            >
              <span class="theme-toggle__icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </div>

      <div class="header__texto">
        <h2 class="no-margin">Blog de café con consejos y cursos</h2>
        <p class="no-margin">
          Aprende de los expertos con las mejores recetas y consejos
        </p>
      </div>
    </header>

    <main class="contenedor">
      <h3 class="centrar-texto">Contacto</h3>

      <div class="contacto-bg"></div>
      <form class="formulario">
        <div class="campo">
          <label class="campo__label" for="nombre">Nombre</label>
          <input class="campo__field" type="text" placeholder="Tu nombre" id="nombre" />
        </div>

        <div class="campo">
          <label class="campo__label" for="email">E-mail</label>
          <input class="campo__field" type="email" placeholder="Tu email" id="email" />
        </div>

        <div class="campo">
          <label class="campo__label" for="mensaje">Mensaje</label>
          <textarea class="campo__field campo__field--textarea"  id="mensaje" placeholder="Tu mensaje"></textarea>
        </div>
        <div class="campo">
          <input type="submit" value="Enviar" class="boton boton--primario" />
        </div>
      </form>
    </main>
    <footer class="footer">
      <div class="contenedor">
        <div class="barra">
          <a class="logo" href="index.html">
            <h1 class="logo__nombre no-margin centrar-texto">
              Coffe<span class="logo__bold">Yunkkies</span>
            </h1>
          </a>

          <nav class="navegacion">
            <a href="nosotros.html" class="navegacion__enlace">Nosotros</a
            ><a href="cursos.html" class="navegacion__enlace">Cursos</a
            ><a href="contacto.html" class="navegacion__enlace">Contacto</a>
          </nav>
        </div>
        <p class="footer__copy no-margin centrar-texto">
          &copy; 2026 Coffee Yunkkies. Todos los derechos reservados.
        </p>
      </div>
    </footer>
    <button
      class="scroll-top"
      type="button"
      aria-label="Volver arriba"
      title="Volver arriba"
    >
      <span class="scroll-top__icon" aria-hidden="true"></span>
    </button>
  </body>
</html>
